# playbook base extra var
my_variable_1: "my_value_1"
hello_there: "Hello Monkeyble"

monkeyble_scenarios:
  validate_hello_monkey:
    name: "Monkeyble hello world"
    extra_vars:
      play_level_var: "scenario level var"
    tasks_to_test:
      - task: "First task"
        test_output:
          - assert_equal:
              result_key: result.ansible_facts.hello_to_who
              expected: "Hello Monkeyble"

      - task: "Second task"
        test_input:
          - assert_equal:
              arg_name: msg
              expected: "Hello Monkeyble"

      - task: "Should be skipped task"
        should_be_skipped: true

      - task: "Push Monkeyble to a fake API"
        mock:
          config:
            monkeyble_module:
              consider_changed: true
              result_dict:
                json:
                  id: 10
                  message: "monkey added"

      - task: "Test loop"
        test_input:
          - assert_equal:
              arg_name: msg
              expected: "general kenobi"
          - assert_equal:
              arg_name: msg
              expected: "master kenobi"

      - task: "This should fail"
        should_fail: true

      - task: "Rescue task"
        should_be_skipped: false

      - task: "Print play var updated at scenario level"
        test_input:
          - assert_equal:
              arg_name: msg
              expected: "scenario level var"

      - task: "Print play var updated at task level"
        extra_vars:
          play_level_var: "task level"
        test_input:
          - assert_equal:
              arg_name: msg
              expected: "task level"
